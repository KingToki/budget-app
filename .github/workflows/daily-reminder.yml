name: Daily Budget Reminder

on:
  schedule:
    - cron: '0 16 * * *'   # 19:00 Kyiv (UTC+3 summer)
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily budget reminder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MESSAGES=(
            "💰 Що в нас сьогодні по витратам? Відкрий бюджет і перевір! 🦆"
            "📊 Як справи з грошима? Час підбити підсумки дня! 💸"
            "🦆 Гроші люблять підрахунок! Не забудь записати витрати за сьогодні ✍️"
            "💡 Хвилина фінансової усвідомленості! Що купив сьогодні? 🛒"
            "🐥 Качка-бухгалтер нагадує: записуй витрати поки не забув! 📝"
            "💳 Вечірня перевірка бюджету! Як ти сьогодні? 🌙"
            "🎯 День добігає кінця — час звірити план і факт! 📈"
            "🦆 Quack! Твій щоденний фінансовий чекін чекає тебе 👀"
            "💰 Маленький крок до фінансової свободи — записати витрати прямо зараз! 🚀"
            "🌟 Гарний вечір! Як пройшов день для твого гаманця? 💼"
            "📅 Нагадування від качки: бюджет сам себе не заповнить! 🦆✏️"
            "🔥 Фінансова дисципліна — це суперсила! Перевір витрати за сьогодні 💪"
          )
          RANDOM_INDEX=$((RANDOM % ${#MESSAGES[@]}))
          MESSAGE="${MESSAGES[$RANDOM_INDEX]}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"${MESSAGE}\", \"reply_markup\": {\"inline_keyboard\": [[{\"text\": \"💰 Відкрити бюджет\", \"web_app\": {\"url\": \"https://kingtoki.github.io/budget-app/\"}}]]}}"
