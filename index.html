<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Фінансовий планувальник</title>
<script src="https://telegram.org/js/telegram-web-app.js">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--card:#1a1a1a;--card2:#202020;--border:#2a2a2a;--border2:#333;
  --accent:#c8f060;--red:#f06060;--blue:#60b8f0;--orange:#f0a060;--green:#60f0a0;--purple:#b060f0;
  --text:#f0ede8;--muted:#555;--muted2:#888;
}
/* Telegram theme override */
body.tg-light{
  --bg:#f5f5f5;--card:#ffffff;--card2:#f0f0f0;--border:#e0e0e0;--border2:#d0d0d0;
  --text:#1a1a1a;--muted:#aaa;--muted2:#777;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;padding:0 0 60px;padding-bottom:calc(60px + env(safe-area-inset-bottom));}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(200,240,96,.05) 0%,transparent 70%);pointer-events:none;}
.wrapper{max-width:820px;margin:0 auto;position:relative;z-index:1;padding:36px 20px 0;}

header{margin-bottom:28px;}
.month-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(30px,6vw,54px);font-weight:900;line-height:1;}
h1 span{color:var(--accent);}

.tabs{display:flex;margin-bottom:32px;border-bottom:1px solid var(--border);}
.tab{padding:12px 28px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--muted2);transition:all .2s;position:relative;font-family:'JetBrains Mono',monospace;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .2s;}
.tab.active{color:var(--text);}.tab.active::after{transform:scaleX(1);}.tab:hover{color:var(--text);}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;margin-left:6px;font-weight:600;}

.tab-panel{display:none;}.tab-panel.active{display:block;animation:fadeUp .3s ease both;}

.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.sc{background:var(--card);border:1px solid var(--border);padding:16px 18px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.inc::before{background:var(--accent)}.sc.exp::before{background:var(--red)}.sc.bal::before{background:var(--blue)}
.sc-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
.sc-val{font-family:'Playfair Display',serif;font-size:clamp(15px,2.5vw,23px);font-weight:700;}
.sc.inc .sc-val{color:var(--accent)}.sc.exp .sc-val{color:var(--red)}
#balance-val{transition:color .3s;}

.action-bar{display:flex;gap:10px;margin-bottom:32px;}
.abtn{flex:1;padding:13px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:1px solid;background:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.abtn.ai{border-color:var(--accent);color:var(--accent)}.abtn.ai:hover{background:rgba(200,240,96,.08)}
.abtn.ae{border-color:var(--red);color:var(--red)}.abtn.ae:hover{background:rgba(240,96,96,.08)}
.abtn.ad{border-color:var(--purple);color:var(--purple)}.abtn.ad:hover{background:rgba(176,96,240,.08)}

section{margin-bottom:28px;}
.sec-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.sec-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}

.item-wrap{margin-bottom:5px;}
.item-main{display:grid;grid-template-columns:22px 1fr auto auto auto;align-items:center;gap:8px;padding:11px 14px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:background .2s,border-color .2s;position:relative;overflow:hidden;user-select:none;}
.item-main::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:opacity .2s;opacity:0;}
.item-main:hover::before{opacity:1;}.item-main:hover{background:#222;border-color:#333;}
.essential .item-main::before{background:var(--red)}
.birthday  .item-main::before{background:var(--blue)}
.extra-exp .item-main::before{background:var(--orange)}
.extra-inc .item-main::before{background:var(--accent)}
.debts-exp .item-main::before{background:var(--purple)}
.chevron{font-size:10px;color:var(--muted);transition:transform .25s;display:flex;align-items:center;justify-content:center;}
.chevron.open{transform:rotate(90deg);}
.item-name-block{min-width:0;}
.item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:9px;color:var(--muted2);margin-top:2px;}
.plan-block,.fact-block,.remain-block{text-align:right;}
.block-label{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.block-val{font-size:12px;font-weight:600;white-space:nowrap;}
.plan-block .block-val{color:var(--muted2)}.fact-block .block-val{color:var(--text)}
.remain-block .block-val.pos{color:var(--green)}.remain-block .block-val.neg{color:var(--red)}.remain-block .block-val.zero{color:var(--muted2)}
.item-progress{height:3px;background:var(--border);overflow:hidden;}
.item-progress-fill{height:100%;transition:width .6s cubic-bezier(.16,1,.3,1),background .3s;}
.item-detail{display:none;background:var(--card2);border:1px solid var(--border);border-top:none;padding:12px 14px 10px;}
.item-detail.open{display:block;animation:fadeUp .2s ease both;}
.detail-entries{margin-bottom:10px;}
.detail-entry{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted2);}
.detail-entry:last-child{border-bottom:none;}
.de-name{flex:1}.de-amount{color:var(--text);font-weight:600;white-space:nowrap;}
.de-del{background:none;border:none;color:var(--border2);cursor:pointer;font-size:13px;padding:0 3px;transition:color .2s;line-height:1;}
.de-del:hover{color:var(--red);}
.add-fact-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.fact-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s;}
.fact-input:focus{border-color:var(--accent);}
.fact-input.amt{width:100px;flex:none;}
.add-fact-btn{background:none;border:1px solid var(--border2);color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.add-fact-btn:hover{border-color:var(--accent);color:var(--accent);}

.total-row{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border:1px solid var(--border);margin-top:4px;background:#161616;}
.total-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);}
.total-vals{display:flex;gap:24px;align-items:center;}
.tv{text-align:right;}
.tv .lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.tv .val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.tv.plan .val{color:var(--muted2)}.tv.fact .val{color:var(--text)}
.tv.rem .val.pos{color:var(--green)}.tv.rem .val.neg{color:var(--red)}.tv.rem .val.zero{color:var(--muted2)}

.bar-section{margin:28px 0 24px;}
.bar-item{margin-bottom:11px;}
.bar-header{display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px;color:var(--muted2);}
.bar-header span:last-child{color:var(--text);}
.bar-track{height:4px;background:var(--border);overflow:hidden;}
.bar-fill{height:100%;transition:width 1s cubic-bezier(.16,1,.3,1);width:0;}
.bar-fill.c1{background:var(--red)}.bar-fill.c2{background:var(--blue)}.bar-fill.c3{background:var(--orange)}.bar-fill.c4{background:var(--purple)}

.note-box{padding:16px;border:1px dashed var(--border);}
.note-box p{font-size:10px;color:var(--muted2);line-height:1.9;}
.note-box strong{color:var(--text);}

/* ===== DEBTS TAB ===== */
.debts-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.ds{background:var(--card);border:1px solid var(--border);padding:16px 18px;position:relative;overflow:hidden;}
.ds::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.ds.total-debt::before{background:var(--red)}.ds.month-pay::before{background:var(--purple)}.ds.debt-free::before{background:var(--green)}
.ds-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
.ds-val{font-family:'Playfair Display',serif;font-size:clamp(15px,2.5vw,22px);font-weight:700;}
.ds.total-debt .ds-val{color:var(--red)}.ds.month-pay .ds-val{color:var(--purple)}.ds.debt-free .ds-val{color:var(--green)}
.debts-action{display:flex;gap:10px;margin-bottom:28px;}

.debt-card{background:var(--card);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.debt-card:hover{border-color:var(--border2);}
.debt-header{display:flex;align-items:center;gap:12px;padding:14px 16px;position:relative;}
.debt-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.debt-card.type-debt .debt-header::before{background:var(--red)}
.debt-card.type-installment .debt-header::before{background:var(--purple)}
.debt-icon{font-size:18px;flex-shrink:0;}
.debt-info{flex:1;min-width:0;}
.debt-name{font-size:13px;font-weight:600;}
.debt-meta{font-size:10px;color:var(--muted2);margin-top:3px;}
.debt-right{text-align:right;flex-shrink:0;}
.debt-amount{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--red);}
.debt-amount.paid{color:var(--green);text-decoration:line-through;opacity:.6;}
.debt-status{font-size:9px;color:var(--muted2);margin-top:3px;}

/* payment log inside debt card */
.debt-payments-log{padding:0 16px 8px;}
.dpl-entry{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);padding:5px 0;border-bottom:1px solid var(--border);}
.dpl-entry:last-child{border-bottom:none;}
.dpl-amount{color:var(--purple);font-weight:600;}
.dpl-del{background:none;border:none;color:var(--border2);cursor:pointer;font-size:12px;transition:color .2s;padding:0 2px;}
.dpl-del:hover{color:var(--red);}

/* inline payment input */
.debt-pay-row{display:flex;gap:8px;padding:0 16px 12px;align-items:center;}
.debt-pay-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s;}
.debt-pay-input:focus{border-color:var(--purple);}
.debt-pay-input.name{max-width:160px;}
.debt-pay-btn{background:none;border:1px solid var(--purple);color:var(--purple);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.debt-pay-btn:hover{background:rgba(176,96,240,.1);}

.inst-progress-wrap{padding:0 16px 12px;}
.inst-bar-header{display:flex;justify-content:space-between;font-size:9px;color:var(--muted2);margin-bottom:5px;}
.inst-bar-track{height:6px;background:var(--border);overflow:hidden;}
.inst-bar-fill{height:100%;background:var(--purple);transition:width .8s cubic-bezier(.16,1,.3,1);}
.inst-payments{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.inst-pip{width:14px;height:14px;border-radius:2px;background:var(--border);transition:background .3s;cursor:pointer;}
.inst-pip.done{background:var(--purple);}.inst-pip:hover{opacity:.7;}

.debt-actions-row{display:flex;gap:8px;padding:8px 16px 14px;border-top:1px solid var(--border);}
.dact-btn{background:none;border:1px solid var(--border2);color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;cursor:pointer;transition:all .2s;}
.dact-btn:hover{border-color:var(--accent);color:var(--accent);}
.dact-btn.del:hover{border-color:var(--red);color:var(--red);}
.dact-btn.pay:hover{border-color:var(--purple);color:var(--purple);}

/* show/hide pay row */
.pay-row-wrap{display:none;}
.pay-row-wrap.open{display:block;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.active{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);padding:26px;width:100%;max-width:400px;animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:18px;}
.modal-title.inc{color:var(--accent)}.modal-title.exp{color:var(--red)}.modal-title.debt{color:var(--purple)}
.field{margin-bottom:12px;}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:5px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:9px 11px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field select option{background:#1a1a1a;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.mbtn{flex:1;padding:11px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:1px solid;background:none;transition:all .2s;}
.mbtn.ci{border-color:var(--accent);color:var(--accent)}.mbtn.ci:hover{background:rgba(200,240,96,.1)}
.mbtn.ce{border-color:var(--red);color:var(--red)}.mbtn.ce:hover{background:rgba(240,96,96,.1)}
.mbtn.cd{border-color:var(--purple);color:var(--purple)}.mbtn.cd:hover{background:rgba(176,96,240,.1)}
.mbtn.cancel{border-color:var(--border);color:var(--muted2)}.mbtn.cancel:hover{border-color:var(--muted2)}
.type-toggle{display:flex;margin-bottom:16px;}
.ttype{flex:1;padding:9px;text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted2);font-family:'JetBrains Mono',monospace;transition:all .2s;}
.ttype:first-child{border-right:none;}
.ttype.active{background:var(--purple);color:#fff;border-color:var(--purple);}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--purple);color:var(--text);font-size:11px;padding:10px 20px;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}


#save-status{font-size:10px;color:var(--muted2);flex:1;letter-spacing:1px;}
#save-status.saved{color:var(--green);}#save-status.saving{color:var(--orange);}
.save-btn{background:none;border:1px solid var(--border2);color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.save-btn:hover{border-color:var(--accent);color:var(--accent);}
.import-btn{display:inline-block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:560px){
  .summary-grid,.debts-summary{grid-template-columns:1fr 1fr}
  .action-bar,.debts-action{flex-direction:column}
  .item-main{grid-template-columns:18px 1fr auto auto}
  .remain-block{display:none}
  .tab{padding:10px 14px;font-size:10px;}
}

/* ===== DUCKS & VISUAL FLAIR ===== */

/* Floating duck in header */
.duck-header {
  font-size: 28px;
  display: inline-block;
  animation: duckFloat 3s ease-in-out infinite;
  cursor: pointer;
  user-select: none;
  margin-right: 10px;
  filter: drop-shadow(0 0 8px rgba(200,240,96,0.4));
}
.duck-header:hover { animation: duckSpin 0.5s ease; }

@keyframes duckFloat {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%      { transform: translateY(-6px) rotate(3deg); }
}
@keyframes duckSpin {
  0%   { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.3); }
  100% { transform: rotate(360deg) scale(1); }
}

/* Walking duck at bottom */
.duck-walk-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 36px;
  pointer-events: none;
  overflow: hidden;
  z-index: 50;
}
.duck-walk {
  position: absolute;
  bottom: 6px;
  font-size: 20px;
  animation: duckWalk 18s linear infinite;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  cursor: pointer;
  pointer-events: all;
}
.duck-walk.reverse {
  animation: duckWalkReverse 22s linear infinite;
  animation-delay: -9s;
}
@keyframes duckWalk {
  0%   { left: -40px;  transform: scaleX(1); }
  49%  { left: calc(100% + 40px); transform: scaleX(1); }
  50%  { left: calc(100% + 40px); transform: scaleX(-1); }
  99%  { left: -40px; transform: scaleX(-1); }
  100% { left: -40px; transform: scaleX(1); }
}
@keyframes duckWalkReverse {
  0%   { left: calc(100% + 40px); transform: scaleX(-1); }
  49%  { left: -40px; transform: scaleX(-1); }
  50%  { left: -40px; transform: scaleX(1); }
  99%  { left: calc(100% + 40px); transform: scaleX(1); }
  100% { left: calc(100% + 40px); transform: scaleX(-1); }
}

/* Confetti canvas */
#confetti-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
}

/* Category icons */
.cat-icon {
  font-size: 16px;
  margin-right: 4px;
  display: inline-block;
}

/* Duck reaction on balance */
.balance-duck {
  font-size: 18px;
  margin-left: 8px;
  display: inline-block;
  transition: all 0.3s;
  animation: duckFloat 3s ease-in-out infinite;
}

/* Sparkle on item add */
@keyframes sparkleIn {
  0%   { opacity:0; transform: scale(0.5) translateY(10px); }
  60%  { opacity:1; transform: scale(1.05) translateY(-2px); }
  100% { opacity:1; transform: scale(1) translateY(0); }
}
.sparkle-in { animation: sparkleIn 0.4s cubic-bezier(0.16,1,0.3,1) both; }

/* Fact added flash */
@keyframes flashGreen {
  0%,100% { background: var(--card2); }
  50%      { background: rgba(96,240,160,0.15); }
}
.flash-green { animation: flashGreen 0.6s ease; }

/* Progress bar pulse when full */
@keyframes pulse-red {
  0%,100% { opacity:1; }
  50%      { opacity:0.6; }
}
.pulse-red { animation: pulse-red 1s ease infinite; }

/* Duck tooltip */
.duck-tip {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--accent);
  color: var(--text);
  font-size: 11px;
  padding: 6px 12px;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}
.duck-tip.show { opacity: 1; }

/* Section icon */
.sec-icon { margin-right: 6px; font-size: 12px; }

/* ===== ONBOARDING ===== */
#onboarding {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: fadeUp .4s ease both;
}
#onboarding.hidden { display: none; }
.ob-box {
  background: var(--card); border: 1px solid var(--border);
  max-width: 480px; width: 100%; padding: 32px 28px;
}
.ob-step { display: none; }
.ob-step.active { display: block; animation: fadeUp .3s ease both; }
.ob-duck { font-size: 48px; text-align: center; margin-bottom: 12px;
  animation: duckFloat 3s ease-in-out infinite; }
.ob-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700;
  text-align: center; margin-bottom: 6px; }
.ob-sub { font-size: 11px; color: var(--muted2); text-align: center; margin-bottom: 24px; line-height: 1.7; }

/* Currency grid */
.currency-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.cur-btn {
  padding: 12px 8px; border: 1px solid var(--border); background: none;
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
  cursor: pointer; transition: all .2s; text-align: center; display: flex;
  flex-direction: column; align-items: center; gap: 3px;
}
.cur-btn .cur-symbol { font-size: 20px; font-weight: 700; }
.cur-btn .cur-code { font-size: 9px; color: var(--muted2); letter-spacing: 1px; }
.cur-btn:hover, .cur-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,.07); }
.cur-btn.selected .cur-code { color: var(--accent); }

/* Custom currency input */
.cur-custom { display: none; margin-bottom: 16px; }
.cur-custom.show { display: flex; gap: 8px; }
.cur-custom input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 13px; padding: 9px 11px; outline: none;
}
.cur-custom input:focus { border-color: var(--accent); }

/* Category selector */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.cat-toggle {
  padding: 12px 14px; border: 1px solid var(--border); background: none;
  color: var(--muted2); font-family: 'JetBrains Mono', monospace; font-size: 11px;
  cursor: pointer; transition: all .2s; text-align: left; display: flex;
  align-items: center; gap: 8px; position: relative;
}
.cat-toggle .ct-icon { font-size: 18px; flex-shrink: 0; }
.cat-toggle .ct-name { flex: 1; }
.cat-toggle .ct-check { font-size: 14px; color: var(--accent); opacity: 0; transition: opacity .2s; }
.cat-toggle.on { border-color: var(--accent); color: var(--text); background: rgba(200,240,96,.05); }
.cat-toggle.on .ct-check { opacity: 1; }
.cat-toggle:hover { border-color: var(--border2); color: var(--text); }

/* Custom category add */
.cat-custom-row { display: flex; gap: 8px; margin-bottom: 16px; }
.cat-custom-row input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 12px; padding: 8px 10px; outline: none;
}
.cat-custom-row input:focus { border-color: var(--accent); }
.cat-custom-row button {
  background: none; border: 1px solid var(--accent); color: var(--accent);
  font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 8px 14px;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.cat-custom-row button:hover { background: rgba(200,240,96,.1); }

.ob-btn {
  width: 100%; padding: 14px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  border: 1px solid var(--accent); background: none; color: var(--accent);
  transition: all .2s; margin-top: 4px;
}
.ob-btn:hover { background: rgba(200,240,96,.1); }
.ob-btn.back { border-color: var(--border); color: var(--muted2); margin-bottom: 8px; }
.ob-btn.back:hover { border-color: var(--muted2); }
.ob-progress { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
.ob-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .3s; }
.ob-dot.active { background: var(--accent); }

/* Settings gear */
.settings-btn {
  position: fixed; top: 16px; right: 16px; z-index: 90;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted2); font-size: 16px; width: 36px; height: 36px;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center;
}
.settings-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Settings panel */
#settings-panel {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(4px);
}
#settings-panel.open { display: flex; }
.settings-box {
  background: var(--card); border: 1px solid var(--border);
  max-width: 400px; width: 100%; padding: 28px; animation: fadeUp .3s ease;
  max-height: 85vh; overflow-y: auto;
}
.settings-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
.settings-section { margin-bottom: 20px; }
.settings-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted2); margin-bottom: 10px; }

</style>
</head>

<script>
// ==================== DATA ====================
const INCOME_BASE = 0;
let nextId = 200;
let modalType = 'expense';
const openPanels = new Set();
const openPayRows = new Set();

const bdata = {
  essential:    [],
  birthday:     [],
  extraIncome:  [],
  extraExpense: [],
  debtsExpense: [],
};

// Each debt: { id, type, name, note, amount?(debt), paid?(debt), payments:[], payment?(inst), totalPay?, donePay?, nextDate? }
// debt.payments: [{id, label, amount, date}] — logged payments that go to budget
let debts = [];
let debtModalType = 'debt';

// ==================== HELPERS ====================

function sumFacts(item){ return item.facts.reduce((s,f)=>s+f.amount,0); }
function totalPlan(cat){ return (bdata[cat]||[]).reduce((s,i)=>s+i.plan,0); }
function totalFact(cat){ return (bdata[cat]||[]).reduce((s,i)=>s+sumFacts(i),0); }
function findItem(id){ for(const k of Object.keys(bdata)){ const f=bdata[k].find(i=>i.id===id); if(f) return f; } }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// Sync installments to bdata.debtsExpense
// Each installment = one budget item with plan=payment, facts=payments made this month
function syncDebtsToBudget(){
  // Keep existing debt-payment items, rebuild from debts
  bdata.debtsExpense = [];
  debts.forEach(d => {
    if(d.type === 'installment'){
      // plan = monthly payment; facts = payments logged this month
      const existing = bdata.debtsExpense.find(i=>i.debtId===d.id);
      if(!existing){
        bdata.debtsExpense.push({
          id: d.budgetItemId || (d.budgetItemId = nextId++),
          debtId: d.id,
          name: d.name,
          note: d.note ? `розстрочка · ${d.note}` : 'розстрочка',
          plan: d.payment,
          facts: d.payments || [],
          isDebtItem: true,
          isInstallment: true,
        });
      }
    } else {
      // Debt: budget item with plan = total amount, facts = partial payments
      const existing = bdata.debtsExpense.find(i=>i.debtId===d.id);
      if(!existing){
        bdata.debtsExpense.push({
          id: d.budgetItemId || (d.budgetItemId = nextId++),
          debtId: d.id,
          name: d.name,
          note: d.note ? `борг · ${d.note}` : 'борг',
          plan: d.amount,
          facts: d.payments || [],
          isDebtItem: true,
          isInstallment: false,
        });
      }
    }
  });
}

// ==================== TABS ====================
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['budget','debts'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

// ==================== RENDER BUDGET ====================
const SECTIONS = [];

function renderBudget(){
  syncDebtsToBudget();
  const root=document.getElementById('sections-root');
  root.innerHTML='';
  // Show empty state if nothing added yet
  const totalItems = Object.values(bdata).flat().filter(i=>!i.isDebtItem).length;
  if(totalItems === 0 && debts.length === 0){
    root.innerHTML=`<div style="text-align:center;padding:48px 20px;color:var(--muted2);border:1px dashed var(--border);margin-bottom:28px">
      <div style="font-size:32px;margin-bottom:12px">💰</div>
      <div style="font-size:13px;margin-bottom:8px;color:var(--text)">Почни планувати бюджет</div>
      <div style="font-size:11px;line-height:1.8">Натисни <strong style="color:var(--accent)">＋ Дохід</strong> щоб додати зарплату<br>або <strong style="color:var(--red)">＋ Витрата</strong> щоб додати витрату</div>
    </div>`;
    recalcBudget(); return;
  }
  SECTIONS.forEach(sec=>{
    const arr=bdata[sec.key];
    if(!arr.length&&(sec.key==='extraIncome'||sec.key==='extraExpense'||sec.key==='debtsExpense')) return;
    const secEl=document.createElement('section');
    secEl.innerHTML=`<div class="sec-header"><span class="sec-title"><span class="sec-icon">${sec.icon||''}</span>${sec.label}</span><div class="sec-line"></div></div>`;
    arr.forEach(item=>secEl.appendChild(buildItemWrap(item,sec)));
    if(!sec.isIncome) secEl.appendChild(buildTotalRow(sec.key));
    root.appendChild(secEl);
  });
  recalcBudget();
}

function buildItemWrap(item,sec){
  const fact=sumFacts(item), remain=item.plan-fact;
  const pct=item.plan>0?Math.min(100,fact/item.plan*100):0;
  const remCls=remain>0?'pos':remain<0?'neg':'zero';
  const isOpen=openPanels.has(item.id);
  const barColor=pct>100?'var(--red)':pct>75?'var(--orange)':'var(--accent)';
  const wrap=document.createElement('div');
  wrap.className=`item-wrap ${sec.cls} sparkle-in`;
  const readOnly = item.isDebtItem; // debt items: no manual fact add from here
  wrap.innerHTML=`
    <div class="item-main" onclick="togglePanel(${item.id})">
      <span class="chevron${isOpen?' open':''}" id="chev-${item.id}">▶</span>
      <div class="item-name-block">
        <div class="item-name">${getAutoIcon(item.name)}${item.name}</div>
        ${item.note?`<div class="item-sub">${item.note}</div>`:''}
      </div>
      <div class="plan-block"><div class="block-label">план</div><div class="block-val">${fmt(item.plan)}</div></div>
      <div class="fact-block"><div class="block-label">факт</div><div class="block-val">${fmt(fact)}</div></div>
      <div class="remain-block"><div class="block-label">залишок</div><div class="block-val ${remCls}">${fmt(remain)}</div></div>
    </div>
    <div class="item-progress"><div class="item-progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="item-detail${isOpen?' open':''}" id="detail-${item.id}">
      <div class="detail-entries" id="entries-${item.id}">
        ${item.facts.length
          ?item.facts.map(f=>`<div class="detail-entry"><span class="de-name">${f.label||'платіж'}</span><span class="de-amount">${fmt(f.amount)}</span>${readOnly?'':'<button class="de-del" onclick="delFact('+item.id+','+f.id+',event)">×</button>'}</div>`).join('')
          :'<div class="detail-entry" style="color:var(--muted);font-size:10px">Ще немає фактичних записів</div>'}
      </div>
      ${readOnly
        ?`<div style="font-size:10px;color:var(--muted2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">Платежі вносяться у вкладці 💳 Борги</div>`
        :`<div class="add-fact-row">
            <input class="fact-input" type="text" placeholder="Назва (опційно)" id="fn-${item.id}">
            <input class="fact-input amt" type="number" placeholder="₴" id="fa-${item.id}" onkeydown="factKey(event,${item.id})">
            <button class="add-fact-btn" onclick="addFact(${item.id})">+ факт</button>
          </div>`
      }
    </div>`;
  return wrap;
}

function buildTotalRow(key){
  const plan=totalPlan(key),fact=totalFact(key),rem=plan-fact;
  const remCls=rem>0?'pos':rem<0?'neg':'zero';
  const div=document.createElement('div');
  div.className='total-row';
  div.innerHTML=`<span class="total-label">Разом</span><div class="total-vals"><div class="tv plan"><div class="lbl">план</div><div class="val">${fmt(plan)}</div></div><div class="tv fact"><div class="lbl">факт</div><div class="val">${fmt(fact)}</div></div><div class="tv rem"><div class="lbl">залишок</div><div class="val ${remCls}">${fmt(rem)}</div></div></div>`;
  return div;
}

function togglePanel(id){
  openPanels.has(id)?openPanels.delete(id):openPanels.add(id);
  renderBudget();
  setTimeout(()=>{ const el=document.getElementById(`detail-${id}`); if(el&&openPanels.has(id)) el.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
}

function addFact(itemId){
  const lEl=document.getElementById('fn-'+itemId), aEl=document.getElementById('fa-'+itemId);
  const amount=parseFloat(aEl.value);
  if(isNaN(amount)||amount<=0){aEl.style.borderColor='var(--red)';setTimeout(()=>aEl.style.borderColor='',800);return;}
  findItem(itemId).facts.push({id:nextId++,label:lEl.value.trim()||'трата',amount});
  openPanels.add(itemId);
  renderBudget();
}
function factKey(e,id){if(e.key==='Enter')addFact(id);}
function delFact(itemId,factId,e){
  e.stopPropagation();
  const item=findItem(itemId);
  item.facts=item.facts.filter(f=>f.id!==factId);
  openPanels.add(itemId);
  renderBudget();
}

function recalcBudget(){
  syncDebtsToBudget();
  const essP=totalPlan('essential'),essF=totalFact('essential');
  const bdP=totalPlan('birthday'),bdF=totalFact('birthday');
  const eiP=totalPlan('extraIncome');
  const eeP=totalPlan('extraExpense'),eeF=totalFact('extraExpense');
  const deP=totalPlan('debtsExpense'),deF=totalFact('debtsExpense');

  const totalIncome=INCOME_BASE+eiP;
  const totalFactSpent=essF+bdF+eeF+deF;
  const balance=totalIncome-totalFactSpent;

  document.getElementById('s-income').textContent=fmt(totalIncome);
  document.getElementById('s-fact').textContent=fmt(totalFactSpent);
  const bEl=document.getElementById('balance-val');
  bEl.textContent=fmt(balance);
  bEl.style.color=balance>=0?'var(--green)':'var(--red)';
  updateBalanceDuck(balance);
  if(balance > 0 && window._lastBalance <= 0 && window._lastBalance !== undefined) launchConfetti();
  window._lastBalance = balance;

  document.getElementById('bl1').textContent=fmt(essP);
  document.getElementById('bl2').textContent=fmt(bdP);
  document.getElementById('bl3').textContent=fmt(eeP);
  document.getElementById('bl4').textContent=fmt(deP);
  document.getElementById('bar3w').style.display=bdata.extraExpense.length?'':'none';
  document.getElementById('bar4w').style.display=bdata.debtsExpense.length?'':'none';
  setTimeout(()=>{
    document.getElementById('bf1').style.width=Math.min(100,essP/totalIncome*100)+'%';
    document.getElementById('bf2').style.width=Math.min(100,bdP/totalIncome*100)+'%';
    document.getElementById('bf3').style.width=Math.min(100,eeP/totalIncome*100)+'%';
    document.getElementById('bf4').style.width=Math.min(100,deP/totalIncome*100)+'%';
  },150);

}

// ==================== RENDER DEBTS ====================
function renderDebts(){
  const root=document.getElementById('debts-root');
  root.innerHTML='';

  if(!debts.length){
    root.innerHTML='<div style="text-align:center;padding:48px 20px;color:var(--muted);font-size:12px;border:1px dashed var(--border)">Борги відсутні — чудово! 🎉</div>';
    updateDebtsSummary(); updateDebtsBadge(); renderBudget(); return;
  }

  debts.forEach(debt=>{
    const card=document.createElement('div');
    card.className=`debt-card type-${debt.type}`;
    const payments = debt.payments||[];
    const totalPaid = payments.reduce((s,p)=>s+p.amount,0);

    if(debt.type==='debt'){
      const remaining = Math.max(0, debt.amount - totalPaid);
      const payRowOpen = openPayRows.has(debt.id);
      card.innerHTML=`
        <div class="debt-header">
          <div class="debt-icon">💸</div>
          <div class="debt-info">
            <div class="debt-name">${debt.name}</div>
            <div class="debt-meta">${debt.note||'Борг'} · виплачено ${fmt(totalPaid)} з ${fmt(debt.amount)}</div>
          </div>
          <div class="debt-right">
            <div class="debt-amount${remaining===0?' paid':''}">${fmt(remaining)}</div>
            <div class="debt-status">${remaining===0?'✅ погашено':'⏳ залишок'}</div>
          </div>
        </div>
        ${payments.length?`<div class="debt-payments-log">${payments.map(p=>`<div class="dpl-entry"><span>${p.label||'платіж'}</span><span class="dpl-amount">${fmt(p.amount)}</span><button class="dpl-del" onclick="deleteDebtPayment(${debt.id},${p.id},event)">×</button></div>`).join('')}</div>`:''}
        <div class="pay-row-wrap${payRowOpen?' open':''}" id="payrow-${debt.id}">
          <div class="debt-pay-row">
            <input class="debt-pay-input name" type="text" placeholder="Нотатка (опційно)" id="dpn-${debt.id}">
            <input class="debt-pay-input" type="number" placeholder="Сума ₴" id="dpa-${debt.id}" onkeydown="debtPayKey(event,${debt.id})">
            <button class="debt-pay-btn" onclick="addDebtPayment(${debt.id})">Внести</button>
          </div>
        </div>
        <div class="debt-actions-row">
          <button class="dact-btn pay" onclick="togglePayRow(${debt.id})">💸 ${payRowOpen?'Сховати':'Внести платіж'}</button>
          <button class="dact-btn del" onclick="deleteDebt(${debt.id})">Видалити</button>
        </div>`;
    } else {
      const done=debt.donePay, total=debt.totalPay;
      const pct=total>0?Math.min(100,done/total*100):0;
      const remaining=total-done;
      const nextDateStr=debt.nextDate?new Date(debt.nextDate).toLocaleDateString('uk-UA',{day:'numeric',month:'long'}):'—';
      const pips=Array.from({length:Math.min(total,36)},(_,i)=>`<div class="inst-pip${i<done?' done':''}" onclick="togglePip(${debt.id},${i})" title="Платіж ${i+1}"></div>`).join('');
      card.innerHTML=`
        <div class="debt-header">
          <div class="debt-icon">📅</div>
          <div class="debt-info">
            <div class="debt-name">${debt.name}</div>
            <div class="debt-meta">${debt.note?debt.note+' · ':''} наступний платіж: ${nextDateStr}</div>
          </div>
          <div class="debt-right">
            <div class="debt-amount">${fmt(debt.payment)}/міс</div>
            <div class="debt-status">${done} з ${total} платежів</div>
          </div>
        </div>
        <div class="inst-progress-wrap">
          <div class="inst-bar-header">
            <span>Прогрес погашення</span>
            <span>${Math.round(pct)}% · залишок ${remaining} платежів · ${fmt(remaining*debt.payment)}</span>
          </div>
          <div class="inst-bar-track"><div class="inst-bar-fill" style="width:${pct}%"></div></div>
          <div class="inst-payments">${pips}</div>
          <div style="font-size:9px;color:var(--muted2);margin-top:8px">Клік по кружечку — відмітити / зняти платіж</div>
        </div>
        <div class="debt-actions-row">
          <button class="dact-btn pay" onclick="makeInstallmentPayment(${debt.id})">✓ Зробити платіж цього місяця</button>
          <button class="dact-btn del" onclick="deleteDebt(${debt.id})">Видалити</button>
        </div>`;
    }
    root.appendChild(card);
  });

  updateDebtsSummary(); updateDebtsBadge(); renderBudget();
}

function togglePayRow(id){
  openPayRows.has(id)?openPayRows.delete(id):openPayRows.add(id);
  renderDebts();
  if(openPayRows.has(id)) setTimeout(()=>{ const el=document.getElementById(`dpa-${id}`); if(el) el.focus(); },100);
}

function addDebtPayment(debtId){
  const nEl=document.getElementById('dpn-'+debtId), aEl=document.getElementById('dpa-'+debtId);
  const amount=parseFloat(aEl.value);
  if(isNaN(amount)||amount<=0){aEl.style.borderColor='var(--red)';setTimeout(()=>aEl.style.borderColor='',800);return;}
  const debt=debts.find(d=>d.id===debtId);
  if(!debt) return;
  if(!debt.payments) debt.payments=[];
  const label=nEl.value.trim()||'платіж';
  const payId=nextId++;
  debt.payments.push({id:payId,label,amount});
  // Sync to budget item
  syncDebtsToBudget();
  const budgetItem=bdata.debtsExpense.find(i=>i.debtId===debtId);
  if(budgetItem) budgetItem.facts=debt.payments;
  nEl.value=''; aEl.value='';
  openPayRows.delete(debtId);
  showToast(`✓ ${fmt(amount)} внесено у витрати бюджету`);
  renderDebts();
}

function debtPayKey(e,id){if(e.key==='Enter')addDebtPayment(id);}

function deleteDebtPayment(debtId, payId, e){
  e.stopPropagation();
  const debt=debts.find(d=>d.id===debtId);
  if(!debt) return;
  debt.payments=debt.payments.filter(p=>p.id!==payId);
  syncDebtsToBudget();
  const budgetItem=bdata.debtsExpense.find(i=>i.debtId===debtId);
  if(budgetItem) budgetItem.facts=debt.payments;
  renderDebts();
}

function makeInstallmentPayment(id){
  const d=debts.find(x=>x.id===id);
  if(!d||d.donePay>=d.totalPay) return;
  d.donePay++;
  if(!d.payments) d.payments=[];
  const payId=nextId++;
  const label=`Платіж ${d.donePay} з ${d.totalPay}`;
  d.payments.push({id:payId,label,amount:d.payment});
  if(d.nextDate){ const nd=new Date(d.nextDate); nd.setMonth(nd.getMonth()+1); d.nextDate=nd.toISOString().split('T')[0]; }
  syncDebtsToBudget();
  const budgetItem=bdata.debtsExpense.find(i=>i.debtId===id);
  if(budgetItem){ budgetItem.facts=d.payments; }
  showToast(`✓ ${fmt(d.payment)} внесено у витрати бюджету`);
  renderDebts();
}

function togglePip(debtId,index){
  const d=debts.find(x=>x.id===debtId); if(!d) return;
  d.donePay=index<d.donePay?index:index+1;
  renderDebts();
}

function deleteDebt(id){
  debts=debts.filter(d=>d.id!==id);
  bdata.debtsExpense=bdata.debtsExpense.filter(i=>i.debtId!==id);
  renderDebts();
}

function updateDebtsSummary(){
  const totalDebt=debts.reduce((s,d)=>{
    if(d.type==='debt') return s+Math.max(0,d.amount-(d.payments||[]).reduce((x,p)=>x+p.amount,0));
    return s+d.payment*(d.totalPay-d.donePay);
  },0);
  const monthPaid=debts.reduce((s,d)=>{
    return s+(d.payments||[]).reduce((x,p)=>x+p.amount,0);
  },0);
  const maxMonths=debts.filter(d=>d.type==='installment').reduce((max,d)=>Math.max(max,d.totalPay-d.donePay),0);
  document.getElementById('ds-total').textContent=fmt(totalDebt);
  document.getElementById('ds-month').textContent=fmt(monthPaid);
  document.getElementById('ds-free').textContent=maxMonths>0?maxMonths+' міс':'Немає';
}

function updateDebtsBadge(){
  const active=debts.filter(d=>{
    if(d.type==='debt') return (d.payments||[]).reduce((s,p)=>s+p.amount,0)<d.amount;
    return d.donePay<d.totalPay;
  }).length;
  const btn=document.getElementById('debts-tab-btn');
  const ex=btn.querySelector('.tab-badge'); if(ex) ex.remove();
  if(active>0) btn.innerHTML+=`<span class="tab-badge">${active}</span>`;
}

// ==================== SETTINGS & CURRENCY & CATEGORIES ====================
let currency = { symbol: '₴', code: 'UAH' };
let activeCategories = [];
let customCategories = [];
let selectedCurrencySymbol = '₴';
let selectedCurrencyCode = 'UAH';

const BASE_CATEGORIES = [
  { key:'housing',   label:'Житло',       icon:'🏠', items:['Оренда','Комунальні','Інтернет'] },
  { key:'food',      label:'Їжа',         icon:'🍽️', items:['Продукти','Кафе','Доставка'] },
  { key:'transport', label:'Транспорт',   icon:'🚗', items:['Бензин','Таксі','Паркування'] },
  { key:'health',    label:"Здоров'я",    icon:'💪', items:['Аптека','Лікар','Спорт'] },
  { key:'education', label:'Навчання',    icon:'🎓', items:['Курси','Книги','Підписки'] },
  { key:'fun',       label:'Розваги',     icon:'🎉', items:['Кіно','Ігри','Хобі'] },
  { key:'savings',   label:'Заощадження', icon:'💰', items:['Подушка безпеки','Інвестиції','Крипто'] },
];

function fmt(n) {
  const sym = currency.symbol;
  const abs = Math.abs(Math.round(n));
  const formatted = abs.toLocaleString('uk-UA');
  return (n < 0 ? '-' : '') + sym + formatted;
}

function selectCurrency(symbol, code, btn) {
  btn.closest('.currency-grid').querySelectorAll('.cur-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCurrencySymbol = symbol;
  selectedCurrencyCode = code;
  const isCustom = symbol === 'custom';
  const box = btn.closest('.ob-box, .settings-box');
  if (box) box.querySelector('.cur-custom')?.classList.toggle('show', isCustom);
}

function getCurrencySymbol() {
  if (selectedCurrencySymbol === 'custom') {
    return document.getElementById('cur-custom-symbol')?.value?.trim() ||
           document.getElementById('settings-cur-symbol')?.value?.trim() || '?';
  }
  return selectedCurrencySymbol;
}

function buildObCatGrid() {
  const grid = document.getElementById('ob-cat-grid');
  if (!grid) return;
  grid.innerHTML = '';
  [...BASE_CATEGORIES, ...customCategories].forEach(cat => {
    const isOn = activeCategories.includes(cat.key);
    const btn = document.createElement('button');
    btn.className = 'cat-toggle' + (isOn ? ' on' : '');
    btn.dataset.key = cat.key;
    btn.innerHTML = `<span class="ct-icon">${cat.icon}</span><span class="ct-name">${cat.label}</span><span class="ct-check">✓</span>`;
    btn.onclick = () => {
      btn.classList.toggle('on');
      const k = btn.dataset.key;
      if (btn.classList.contains('on')) { if (!activeCategories.includes(k)) activeCategories.push(k); }
      else activeCategories = activeCategories.filter(x => x !== k);
    };
    grid.appendChild(btn);
  });
}

function buildSettingsCatGrid() {
  const grid = document.getElementById('settings-cat-grid');
  if (!grid) return;
  grid.innerHTML = '';
  [...BASE_CATEGORIES, ...customCategories].forEach(cat => {
    const isOn = activeCategories.includes(cat.key);
    const btn = document.createElement('button');
    btn.className = 'cat-toggle' + (isOn ? ' on' : '');
    btn.dataset.key = cat.key;
    btn.innerHTML = `<span class="ct-icon">${cat.icon}</span><span class="ct-name">${cat.label}</span><span class="ct-check">✓</span>`;
    btn.onclick = () => {
      btn.classList.toggle('on');
      const k = btn.dataset.key;
      if (btn.classList.contains('on')) { if (!activeCategories.includes(k)) activeCategories.push(k); }
      else activeCategories = activeCategories.filter(x => x !== k);
    };
    grid.appendChild(btn);
  });
  // Mark current currency
  document.querySelectorAll('#settings-currency-grid .cur-btn').forEach(b => {
    const sym = b.querySelector('.cur-symbol')?.textContent;
    b.classList.toggle('selected', sym === currency.symbol || (currency.symbol.length > 1 && sym === '✏️'));
  });
}

function addCustomCat(inputId) {
  const input = document.getElementById(inputId);
  const name = input.value.trim();
  if (!name) return;
  const key = 'custom_' + Date.now();
  const emojiMatch = name.match(/^(\p{Emoji}+)\s*/u);
  const icon = emojiMatch ? emojiMatch[1] : '🏷️';
  const label = emojiMatch ? name.slice(emojiMatch[0].length).trim() || name : name;
  customCategories.push({ key, label, icon });
  activeCategories.push(key);
  if (!bdata[key]) bdata[key] = [];
  input.value = '';
  buildObCatGrid();
  buildSettingsCatGrid();
  rebuildBudgetSections();
}

function obNext(step) {
  document.querySelectorAll('.ob-step').forEach(s => s.classList.remove('active'));
  document.getElementById('ob-step-' + step)?.classList.add('active');
  if (step === 2) buildObCatGrid();
}

function finishOnboarding() {
  currency.symbol = getCurrencySymbol();
  currency.code = selectedCurrencyCode === 'custom'
    ? (document.getElementById('cur-custom-code')?.value?.trim() || '') : selectedCurrencyCode;
  if (activeCategories.length === 0) activeCategories = BASE_CATEGORIES.map(c => c.key);
  saveSettings();
  document.getElementById('onboarding').classList.add('hidden');
  rebuildBudgetSections();
  renderBudget();
  renderDebts();
  launchConfetti();
}

function openSettings() {
  buildSettingsCatGrid();
  document.getElementById('settings-panel').classList.add('open');
}

function closeSettings() {
  const newSym = getCurrencySymbol();
  if (newSym && newSym !== '?') currency.symbol = newSym;
  if (selectedCurrencyCode && selectedCurrencyCode !== 'custom') currency.code = selectedCurrencyCode;
  else {
    const c = document.getElementById('settings-cur-code')?.value?.trim();
    if (c) currency.code = c;
  }
  saveSettings();
  document.getElementById('settings-panel').classList.remove('open');
  rebuildBudgetSections();
  renderBudget();
}

function settingsOvClick(e) {
  if (e.target === document.getElementById('settings-panel')) closeSettings();
}

function rebuildBudgetSections() {
  const allCats = [...BASE_CATEGORIES, ...customCategories];
  SECTIONS.length = 0;
  // Income always first
  SECTIONS.push({ key:'extraIncome', label:'Доходи', cls:'extra-inc', isIncome:true, icon:'💸' });
  // Active categories
  activeCategories.forEach(key => {
    const cat = allCats.find(c => c.key === key);
    if (!cat) return;
    if (!bdata[key]) bdata[key] = [];
    SECTIONS.push({ key, label:cat.label, cls:'extra-exp', isIncome:false, icon:cat.icon });
  });
  // Debts always last
  SECTIONS.push({ key:'debtsExpense', label:'Борги та розстрочки', cls:'debts-exp', isIncome:false, icon:'💳' });
  // Rebuild m-cat dropdown
  const catSel = document.getElementById('m-cat');
  if (catSel) {
    catSel.innerHTML = '';
    SECTIONS.filter(s => !s.isIncome && s.key !== 'debtsExpense').forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.key; opt.textContent = s.icon + ' ' + s.label;
      catSel.appendChild(opt);
    });
  }
}


function initSettings() {
  try {
    const savedCurrency   = storage.get('budget_currency');
    const savedCats       = storage.get('budget_active_cats');
    const savedCustomCats = storage.get('budget_custom_cats');
    const setupDone       = storage.get('budget_setup_done');
    if (savedCurrency)    { try { currency = JSON.parse(savedCurrency); selectedCurrencySymbol = currency.symbol; selectedCurrencyCode = currency.code; } catch(e){} }
    if (savedCats)        { try { activeCategories = JSON.parse(savedCats); } catch(e){} }
    if (savedCustomCats)  { try { customCategories = JSON.parse(savedCustomCats); } catch(e){} }
    if (!setupDone) {
      const ob = document.getElementById('onboarding');
      if (ob) { ob.classList.remove('hidden'); ob.style.display='flex'; }
    } else {
      rebuildBudgetSections();
    }
  } catch(e) {
    console.error('initSettings error:', e);
    const ob = document.getElementById('onboarding');
    if (ob) { ob.classList.remove('hidden'); ob.style.display='flex'; }
  }
}

// Patch saveSettings to use safe storage
function saveSettings() {
  try {
    storage.set('budget_currency', JSON.stringify(currency));
    storage.set('budget_active_cats', JSON.stringify(activeCategories));
    storage.set('budget_custom_cats', JSON.stringify(customCategories));
    storage.set('budget_setup_done', '1');
  } catch(e) { console.error('saveSettings error:', e); }
}

// Set current month in header
try {
  const months=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
  const now=new Date();
  const el=document.getElementById('budget-title');
  if(el) el.innerHTML=months[now.getMonth()]+' <span>\'' + String(now.getFullYear()).slice(2)+'</span>';
} catch(e) {}

// Telegram Web App init
try {
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if (tg.colorScheme === 'light') document.body.classList.add('tg-light');
    tg.onEvent('themeChanged', () => document.body.classList.toggle('tg-light', tg.colorScheme === 'light'));
    tg.enableClosingConfirmation();
    try {
      tg.MainButton.setText('＋ Додати витрату');
      tg.MainButton.color = '#f06060';
      tg.MainButton.textColor = '#ffffff';
      tg.MainButton.show();
      tg.MainButton.onClick(() => openModal('expense'));
    } catch(e) {}
  }
} catch(e) { console.error('TG init error:', e); }

// Main init
try {
  initSettings();
} catch(e) {
  console.error('initSettings failed:', e);
  const ob = document.getElementById('onboarding');
  if (ob) { ob.classList.remove('hidden'); ob.style.display='flex'; }
}

try { renderBudget(); } catch(e) { console.error('renderBudget failed:', e); }
try { renderDebts(); } catch(e) { console.error('renderDebts failed:', e); }
</script>
