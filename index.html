<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Бюджет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d0d;--card:#1a1a1a;--card2:#202020;--border:#2a2a2a;--border2:#333;
  --accent:#c8f060;--red:#f06060;--blue:#60b8f0;--orange:#f0a060;--green:#60f0a0;--purple:#b060f0;
  --text:#f0ede8;--muted:#555;--muted2:#888;
}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;padding-bottom:60px;}

/* SETTINGS */
.gear-btn{position:fixed;top:14px;right:14px;z-index:90;background:var(--card);border:1px solid var(--border);color:var(--muted2);font-size:16px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.gear-btn:hover{border-color:var(--accent);color:var(--accent);}
#sp{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
#sp.open{display:flex;}
.sp-box{background:var(--card);border:1px solid var(--border);max-width:400px;width:100%;padding:24px;animation:fadeUp .3s ease;max-height:85vh;overflow-y:auto;}
.sp-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:18px;}
.sp-sec{margin-bottom:18px;}
.sp-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;}

/* MAIN APP */
.wrapper{max-width:820px;margin:0 auto;padding:36px 20px 0;position:relative;}
header{margin-bottom:24px;}
.month-lbl{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,50px);font-weight:900;line-height:1;}
h1 span{color:var(--accent);}
.duck-h{font-size:26px;display:inline-block;animation:duckFloat 3s ease-in-out infinite;cursor:pointer;margin-right:8px;filter:drop-shadow(0 0 8px rgba(200,240,96,.3));}

/* TABS */
.tabs{display:flex;margin-bottom:28px;border-bottom:1px solid var(--border);}
.tab{padding:11px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--muted2);transition:all .2s;position:relative;font-family:'JetBrains Mono',monospace;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .2s;}
.tab.on{color:var(--text);}.tab.on::after{transform:scaleX(1);}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:9px;width:15px;height:15px;border-radius:50%;margin-left:5px;}
.tab-panel{display:none;}.tab-panel.on{display:block;animation:fadeUp .3s ease;}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.sc{background:var(--card);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.inc::before{background:var(--accent)}.sc.exp::before{background:var(--red)}.sc.bal::before{background:var(--blue)}
.sc-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.sc-val{font-family:'Playfair Display',serif;font-size:clamp(14px,2.5vw,21px);font-weight:700;}
.sc.inc .sc-val{color:var(--accent)}.sc.exp .sc-val{color:var(--red)}

/* ACTION BAR */
.act-bar{display:flex;gap:10px;margin-bottom:28px;}
.abtn{flex:1;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:1px solid;background:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.abtn.ai{border-color:var(--accent);color:var(--accent)}.abtn.ai:hover{background:rgba(200,240,96,.08)}
.abtn.ae{border-color:var(--red);color:var(--red)}.abtn.ae:hover{background:rgba(240,96,96,.08)}
.abtn.ad{border-color:var(--purple);color:var(--purple)}.abtn.ad:hover{background:rgba(176,96,240,.08)}

/* SECTIONS */
section{margin-bottom:24px;}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sec-ttl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}

/* ITEMS */
.item-wrap{margin-bottom:4px;}
.item-main{display:grid;grid-template-columns:20px 1fr auto auto auto;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:background .2s;position:relative;overflow:hidden;user-select:none;}
.item-main::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;opacity:0;transition:opacity .2s;}
.item-main:hover::before{opacity:1;}.item-main:hover{background:#1e1e1e;}
.s-inc .item-main::before{background:var(--accent)}
.s-exp .item-main::before{background:var(--red)}
.s-debt .item-main::before{background:var(--purple)}
.chev{font-size:9px;color:var(--muted);transition:transform .2s;}
.chev.open{transform:rotate(90deg);}
.i-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.i-sub{font-size:9px;color:var(--muted2);margin-top:1px;}
.i-plan,.i-fact,.i-rem{text-align:right;}
.blbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.bval{font-size:11px;font-weight:600;white-space:nowrap;}
.i-plan .bval{color:var(--muted2)}.i-fact .bval{color:var(--text)}
.i-rem .bval.pos{color:var(--green)}.i-rem .bval.neg{color:var(--red)}.i-rem .bval.zero{color:var(--muted2)}
.i-prog{height:3px;background:var(--border);overflow:hidden;}
.i-prog-fill{height:100%;transition:width .5s;}
.i-detail{display:none;background:var(--card2);border:1px solid var(--border);border-top:none;padding:10px 12px 8px;}
.i-detail.open{display:block;}
.d-entries{margin-bottom:8px;}
.d-entry{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted2);}
.d-entry:last-child{border-bottom:none;}
.de-n{flex:1}.de-a{color:var(--text);font-weight:600;white-space:nowrap;}
.de-del{background:none;border:none;color:var(--border2);cursor:pointer;font-size:12px;padding:0 2px;transition:color .2s;}
.de-del:hover{color:var(--red);}
.add-fact-row{display:flex;gap:6px;align-items:center;margin-top:6px;}
.f-inp{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 8px;outline:none;transition:border-color .2s;}
.f-inp:focus{border-color:var(--accent);}
.f-inp.amt{width:90px;flex:none;}
.f-add{background:none;border:1px solid var(--border2);color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.f-add:hover{border-color:var(--accent);color:var(--accent);}

/* TOTAL ROW */
.tot-row{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;border:1px solid var(--border);margin-top:3px;background:#161616;}
.tot-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);}
.tot-vals{display:flex;gap:20px;}
.tv{text-align:right;}
.tv .tl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.tv .tv-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}
.tv.plan .tv-val{color:var(--muted2)}.tv.fact .tv-val{color:var(--text)}
.tv.rem .tv-val.pos{color:var(--green)}.tv.rem .tv-val.neg{color:var(--red)}.tv.rem .tv-val.zero{color:var(--muted2)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted2);border:1px dashed var(--border);margin-bottom:24px;}
.empty-state .ei{font-size:30px;margin-bottom:10px;}
.empty-state .et{font-size:12px;color:var(--text);margin-bottom:6px;}
.empty-state .es{font-size:10px;line-height:1.8;}

/* BARS */
.bars{margin:24px 0;}
.bar-item{margin-bottom:10px;}
.bar-hdr{display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px;color:var(--muted2);}
.bar-hdr span:last-child{color:var(--text);}
.bar-track{height:4px;background:var(--border);overflow:hidden;}
.bar-fill{height:100%;transition:width .8s cubic-bezier(.16,1,.3,1);width:0;}
.c1{background:var(--accent)}.c2{background:var(--blue)}.c3{background:var(--orange)}.c4{background:var(--purple)}

/* DEBT CARDS */
.ds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.ds{background:var(--card);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden;}
.ds::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.ds.td::before{background:var(--red)}.ds.mp::before{background:var(--purple)}.ds.df::before{background:var(--green)}
.ds-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.ds-val{font-family:'Playfair Display',serif;font-size:clamp(13px,2.5vw,20px);font-weight:700;}
.ds.td .ds-val{color:var(--red)}.ds.mp .ds-val{color:var(--purple)}.ds.df .ds-val{color:var(--green)}
.debt-card{background:var(--card);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.debt-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;position:relative;}
.debt-hdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.type-debt .debt-hdr::before{background:var(--red)}
.type-inst .debt-hdr::before{background:var(--purple)}
.d-icon{font-size:16px;flex-shrink:0;}
.d-info{flex:1;min-width:0;}
.d-name{font-size:12px;font-weight:600;}
.d-meta{font-size:9px;color:var(--muted2);margin-top:2px;}
.d-right{text-align:right;flex-shrink:0;}
.d-amt{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--red);}
.d-amt.paid{color:var(--green);text-decoration:line-through;opacity:.6;}
.d-status{font-size:9px;color:var(--muted2);margin-top:2px;}
.d-pay-log{padding:0 14px 6px;}
.dpl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);padding:4px 0;border-bottom:1px solid var(--border);}
.dpl:last-child{border-bottom:none;}
.dpl-a{color:var(--purple);font-weight:600;}
.dpl-del{background:none;border:none;color:var(--border2);cursor:pointer;font-size:11px;transition:color .2s;padding:0 2px;}
.dpl-del:hover{color:var(--red);}
.d-pay-row{display:none;flex-direction:row;gap:8px;padding:0 14px 10px;align-items:center;}
.d-pay-row.open{display:flex;}
.d-pay-inp{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 9px;outline:none;transition:border-color .2s;}
.d-pay-inp:focus{border-color:var(--purple);}
.d-pay-inp.nm{max-width:140px;}
.d-pay-btn{background:none;border:1px solid var(--purple);color:var(--purple);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.d-pay-btn:hover{background:rgba(176,96,240,.1);}
.inst-prog{padding:0 14px 10px;}
.inst-bar-hdr{display:flex;justify-content:space-between;font-size:9px;color:var(--muted2);margin-bottom:4px;}
.inst-track{height:5px;background:var(--border);overflow:hidden;}
.inst-fill{height:100%;background:var(--purple);transition:width .6s;}
.inst-pips{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.pip{width:13px;height:13px;border-radius:2px;background:var(--border);transition:background .2s;cursor:pointer;}
.pip.done{background:var(--purple);}.pip:hover{opacity:.7;}
.d-act-row{display:flex;gap:8px;padding:6px 14px 12px;border-top:1px solid var(--border);}
.dact{background:none;border:1px solid var(--border2);color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;cursor:pointer;transition:all .2s;}
.dact:hover{border-color:var(--accent);color:var(--accent);}
.dact.del:hover{border-color:var(--red);color:var(--red);}
.dact.pay:hover{border-color:var(--purple);color:var(--purple);}
.no-debts{text-align:center;padding:40px 20px;color:var(--muted);font-size:11px;border:1px dashed var(--border);}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:20px;}
.modal-ov.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);padding:24px;width:100%;max-width:390px;animation:fadeUp .3s ease;max-height:88vh;overflow-y:auto;}
.m-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:16px;}
.m-title.inc{color:var(--accent)}.m-title.exp{color:var(--red)}.m-title.debt{color:var(--purple)}
.field{margin-bottom:10px;}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 10px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field select option{background:#1a1a1a;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fact-check{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:11px;color:var(--muted2);padding:8px 0;}
.fact-check input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.m-acts{display:flex;gap:8px;margin-top:14px;}
.mbtn{flex:1;padding:10px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:1px solid;background:none;transition:all .2s;}
.mbtn.ci{border-color:var(--accent);color:var(--accent)}.mbtn.ci:hover{background:rgba(200,240,96,.1)}
.mbtn.ce{border-color:var(--red);color:var(--red)}.mbtn.ce:hover{background:rgba(240,96,96,.1)}
.mbtn.cd{border-color:var(--purple);color:var(--purple)}.mbtn.cd:hover{background:rgba(176,96,240,.1)}
.mbtn.cancel{border-color:var(--border);color:var(--muted2)}.mbtn.cancel:hover{border-color:var(--muted2);}
.type-tog{display:flex;margin-bottom:14px;}
.tt{flex:1;padding:8px;text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted2);font-family:'JetBrains Mono',monospace;transition:all .2s;}
.tt:first-child{border-right:none;}
.tt.on{background:var(--purple);color:#fff;border-color:var(--purple);}

/* DUCKS */
.duck-wrap{position:fixed;bottom:0;left:0;right:0;height:34px;pointer-events:none;overflow:hidden;z-index:40;}
.duck-w{position:absolute;bottom:5px;font-size:18px;animation:duckWalk 20s linear infinite;pointer-events:all;cursor:pointer;}
.duck-w.r{animation:duckWalkR 25s linear infinite;animation-delay:-12s;}
.duck-tip{position:fixed;background:var(--card);border:1px solid var(--accent);color:var(--text);font-size:10px;padding:5px 12px;z-index:200;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;font-family:'JetBrains Mono',monospace;border-radius:2px;}
.duck-tip.show{opacity:1;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998;}

/* TOAST */
.toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--card2);border:1px solid var(--purple);color:var(--text);font-size:10px;padding:8px 18px;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes duckFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
@keyframes duckWalk{0%{left:-30px;transform:scaleX(1)}49%{left:calc(100% + 30px);transform:scaleX(1)}50%{left:calc(100% + 30px);transform:scaleX(-1)}99%{left:-30px;transform:scaleX(-1)}100%{left:-30px;transform:scaleX(1)}}
@keyframes duckWalkR{0%{left:calc(100% + 30px);transform:scaleX(-1)}49%{left:-30px;transform:scaleX(-1)}50%{left:-30px;transform:scaleX(1)}99%{left:calc(100% + 30px);transform:scaleX(1)}100%{left:calc(100% + 30px);transform:scaleX(-1)}}

@media(max-width:520px){
  .sum-grid{grid-template-columns:1fr 1fr}.ds-grid{grid-template-columns:1fr 1fr}
  .act-bar{flex-direction:column}.item-main{grid-template-columns:18px 1fr auto auto}
  .i-rem{display:none}.tab{padding:10px 14px;font-size:10px;}
}

.cur-switcher{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;}
.cs-btn{padding:5px 12px;border:1px solid var(--border);background:none;color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;border-radius:2px;}
.cs-btn:hover{border-color:var(--border2);color:var(--text);}
.cs-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,.08);}
</style>
</head>
<body>

<!-- SETTINGS PANEL -->
<div id="sp" onclick="if(event.target===this)closeSP()">
  <div class="sp-box">
    <div class="sp-title">⚙️ Налаштування</div>
    <div class="sp-sec">
      <div class="sp-lbl">Категорії витрат</div>
      <div class="cat-grid" id="sp-cats"></div>
      <div class="add-cat-row">
        <input class="ob-inp" type="text" id="sp-new-cat" placeholder="🏷️ Своя категорія...">
        <button class="add-cat-btn" onclick="addCat('sp-new-cat')">+ Додати</button>
      </div>
    </div>
    <button class="ob-btn" onclick="closeSP()">Зберегти ✓</button>
  </div>
</div>

<button class="gear-btn" onclick="openSP()">⚙️</button>

<!-- MAIN APP -->
<div class="wrapper">
  <header>
    <div class="month-lbl">🦆 Фінансовий планувальник</div>
    <h1><span class="duck-h" onclick="duckTap(this)">🦆</span><span id="h-title">Мій <span>Бюджет</span></span></h1>
    <div class="cur-switcher">
      <button class="cs-btn sel" onclick="switchCur('₴',this)">₴ UAH</button>
      <button class="cs-btn" onclick="switchCur('$',this)">$ USD</button>
      <button class="cs-btn" onclick="switchCur('€',this)">€ EUR</button>
      <button class="cs-btn" onclick="switchCur('₮',this)">₮ USDT</button>
      <button class="cs-btn" onclick="switchCur('£',this)">£ GBP</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab on" onclick="goTab('budget',this)">💰 Бюджет</button>
    <button class="tab" onclick="goTab('debts',this)" id="debts-tab">💳 Борги</button>
  </div>

  <!-- BUDGET TAB -->
  <div class="tab-panel on" id="tab-budget">
    <div class="sum-grid">
      <div class="sc inc"><div class="sc-lbl">Дохід</div><div class="sc-val" id="s-inc">—</div></div>
      <div class="sc exp"><div class="sc-lbl">Витрачено</div><div class="sc-val" id="s-exp">—</div></div>
      <div class="sc bal"><div class="sc-lbl">Залишок</div><div class="sc-val" id="s-bal">—<span id="bal-duck" style="font-size:16px;margin-left:6px;">🦆</span></div></div>
    </div>
    <div class="act-bar">
      <button class="abtn ai" onclick="openModal('income')">＋ Дохід</button>
      <button class="abtn ae" onclick="openModal('expense')">＋ Витрата</button>
    </div>
    <div id="sections-root"></div>
    <div class="bars" id="bars-wrap" style="display:none">
      <div class="sec-hdr"><span class="sec-ttl">Розподіл</span><div class="sec-line"></div></div>
      <div id="bars-inner"></div>
    </div>
  </div>

  <!-- DEBTS TAB -->
  <div class="tab-panel" id="tab-debts">
    <div class="ds-grid">

<script>

  { key:'housing',   lbl:'Житло',       icon:'🏠' },

const store = {

// ═══════════════════════════════════════
function fmt(n){
  const s=CUR.sym, abs=Math.abs(Math.round(n)).toLocaleString('uk-UA');
  return (n<0?'-':'')+s+abs;
}
function uid(){ return nextId++; }
function sumFacts(item){ return (item.facts||[]).reduce((s,f)=>s+f.amount,0); }
function totalPlan(key){ return (bdata[key]||[]).reduce((s,i)=>s+i.plan,0); }
function totalFact(key){ return (bdata[key]||[]).reduce((s,i)=>s+sumFacts(i),0); }

const ICON_MAP = [
  [['оренд','квартир'],'🏠'],[['комунал','електр'],'💡'],[['інтернет'],'📶'],
  [['продукт','супермаркет','сільпо','metro','атб'],'🛒'],[['кафе','ресторан','їжа','доставк'],'🍕'],
  [['кава','кофе'],'☕'],[['алко','пиво','вино'],'🍺'],[['бензин','заправ','паливо'],'⛽'],
  [['авто','машин','ремонт авт'],'🚗'],[['таксі','убер','bolt'],'🚕'],[['метро','транспорт'],'🚇'],
  [['одяг','взуття','шопінг'],'👕'],[['аптека','ліки','лікар'],'💊'],[['спорт','фітнес','зал'],'🏋️'],
  [['кіно','кино','розваг'],'🎬'],[['підписк','netflix','spotify'],'📱'],[['курс','навчан','книг'],'📚'],
  [['зарплат','оклад'],'💰'],[['фріланс','проект'],'💻'],[['бонус','премія'],'🎁'],
  [['борг','кредит'],'💸'],[['розстроч'],'📅'],
];
function autoIcon(name){
  const l=name.toLowerCase();
  for(const [keys,icon] of ICON_MAP){ if(keys.some(k=>l.includes(k))) return icon+' '; }
  return '';
}

const QUIPS=['Quack! 🦆','Записуй витрати! 📝','Гроші люблять рахунок 💰','Кря! Бюджет в нормі?','Качка-бухгалтер стежить 👀','Зекономлена копійка — зароблена копійка!','Quack quack! 🦆🦆','Не витрачай все одразу! 😅'];

function showTip(msg,rect){
  const t=document.getElementById('dtip');
  t.textContent=msg;
  t.style.left=Math.min(rect.left,window.innerWidth-220)+'px';

}

// ═══════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════
function confetti(){
  const cv=document.getElementById('confetti');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const pieces=Array.from({length:70},()=>({
    x:Math.random()*cv.width, y:-20,
    r:Math.random()*7+3, d:Math.random()*18+4,
    color:['#c8f060','#f06060','#60b8f0','#f0a060','#b060f0','#60f0a0'][Math.floor(Math.random()*6)],
    tilt:Math.random()*10-5, ts:Math.random()*.1+.04,
    ta:0, emoji:Math.random()>.88?'🦆':null
  }));
  let f=0;
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{
      p.ta+=p.ts; p.y+=Math.cos(p.d)+2; p.x+=Math.sin(f/15)*1.5; p.tilt=Math.sin(p.ta)*12;
      if(p.emoji){ ctx.font='16px serif'; ctx.fillText(p.emoji,p.x,p.y); }
      else{ ctx.beginPath(); ctx.lineWidth=p.r/2; ctx.strokeStyle=p.color;
        ctx.moveTo(p.x+p.tilt+p.r/4,p.y); ctx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/4); ctx.stroke(); }
    });
    f++;
    if(f<110) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  draw();
}

  return CUR_SEL==='₴'?'UAH':CUR_SEL==='$'?'USD':CUR_SEL==='€'?'EUR':CUR_SEL==='₮'?'USDT':CUR_SEL==='£'?'GBP':'';

function renderObCats(){
  const grid=document.getElementById('ob-cats');
  if(!grid) return;

  [...BASE_CATS,...CATS_CUSTOM].forEach(c=>{

    b.innerHTML=`<span class="ci">${c.icon}</span><span>${c.lbl}</span><span class="ck">✓</span>`;
    b.onclick=()=>{
      b.classList.toggle('on');
      const k=b.dataset.key;
      if(b.classList.contains('on')){ if(!CATS_ACTIVE.includes(k)) CATS_ACTIVE.push(k); }
      else CATS_ACTIVE=CATS_ACTIVE.filter(x=>x!==k);

function renderSpCats(){
  const grid=document.getElementById('sp-cats');
  if(!grid) return;
  grid.innerHTML='';
  [...BASE_CATS,...CATS_CUSTOM].forEach(c=>{
    const on=CATS_ACTIVE.includes(c.key);

    b.className='cat-btn'+(on?' on':'');
    b.dataset.key=c.key;
    b.innerHTML=`<span class="ci">${c.icon}</span><span>${c.lbl}</span><span class="ck">✓</span>`;

      b.classList.toggle('on');
      const k=b.dataset.key;
      if(b.classList.contains('on')){ if(!CATS_ACTIVE.includes(k)) CATS_ACTIVE.push(k); }
      else CATS_ACTIVE=CATS_ACTIVE.filter(x=>x!==k);
    };
    grid.appendChild(b);
  });
  // mark current currency
  document.querySelectorAll('#sp-cur-grid .cur-btn').forEach(b=>{
    const s=b.querySelector('.cs')?.textContent;

function addCat(inputId){
  const inp=document.getElementById(inputId);
  const name=(inp?.value||'').trim();
  if(!name) return;
  const key='c_'+Date.now();
  const em=name.match(/^(\p{Emoji}+)\s*/u);
  const icon=em?em[1]:'🏷️';
  const lbl=em?name.slice(em[0].length).trim()||name:name;
  CATS_CUSTOM.push({key,lbl,icon});
  CATS_ACTIVE.push(key);
  if(!bdata[key]) bdata[key]=[];
  inp.value='';
  renderObCats(); renderSpCats(); rebuildSections();
}

function finishOb(){
  CUR.sym=getPickedSym();
  CUR.code=getPickedCode();
  if(CATS_ACTIVE.length===0) CATS_ACTIVE=BASE_CATS.map(c=>c.key);

// ═══════════════════════════════════════
//  SETTINGS PANEL
// ═══════════════════════════════════════
function openSP(){
  renderSpCats();
  document.getElementById('sp').classList.add('open');
}
function closeSP(){
  saveAll();
  document.getElementById('sp').classList.remove('open');
  rebuildSections();
  renderBudget();
}

// ═══════════════════════════════════════
//  SECTIONS & BDATA
// ═══════════════════════════════════════
function rebuildSections(){
  SECTIONS.length=0;
  SECTIONS.push({key:'extraIncome',lbl:'Доходи',cls:'s-inc',isInc:true,icon:'💸'});
  const allCats=[...BASE_CATS,...CATS_CUSTOM];
  CATS_ACTIVE.forEach(key=>{
    const cat=allCats.find(c=>c.key===key);
    if(!cat) return;
    if(!bdata[key]) bdata[key]=[];
    SECTIONS.push({key,lbl:cat.lbl,cls:'s-exp',isInc:false,icon:cat.icon});
  });
  SECTIONS.push({key:'debtsExpense',lbl:'Борги та розстрочки',cls:'s-debt',isInc:false,icon:'💳'});
  // ensure extraIncome exists
  if(!bdata['extraIncome']) bdata['extraIncome']=[];
  if(!bdata['debtsExpense']) bdata['debtsExpense']=[];
  // rebuild cat dropdown
  const sel=document.getElementById('bm-cat');
  if(sel){
    sel.innerHTML='';
    SECTIONS.filter(s=>!s.isInc&&s.key!=='debtsExpense').forEach(s=>{
      const o=document.createElement('option');
      o.value=s.key; o.textContent=s.icon+' '+s.lbl;
      sel.appendChild(o);
    });
  }
}

// sync installments/debts into debtsExpense for budget tracking
function syncDebts(){
  bdata['debtsExpense']=[];
  debts.forEach(d=>{
    if(!d.budgetId) d.budgetId=uid();
    bdata['debtsExpense'].push({
      id:d.budgetId, debtId:d.id,
      name:d.name,
      note:d.type==='inst'?'розстрочка':'борг',
      plan:d.type==='inst'?d.payment:d.amount,
      facts:d.payments||[],
      isDebt:true
    });
  });
}

// ═══════════════════════════════════════
//  RENDER BUDGET
// ═══════════════════════════════════════
function renderBudget(){
  syncDebts();
  const root=document.getElementById('sections-root');
  if(!root) return;
  root.innerHTML='';

  const totalItems=Object.values(bdata).flat().filter(i=>!i.isDebt).length;
  if(totalItems===0&&debts.length===0){
    root.innerHTML=`<div class="empty-state"><div class="ei">💰</div><div class="et">Почни планувати бюджет</div><div class="es">Натисни <strong>＋ Дохід</strong> щоб вказати зарплату<br>або <strong>＋ Витрата</strong> щоб додати витрату</div></div>`;
    recalc(); return;
  }

  SECTIONS.forEach(sec=>{
    const arr=bdata[sec.key]||[];
    if(!arr.length&&(sec.key==='extraIncome'||sec.key==='debtsExpense')) return;
    const secEl=document.createElement('section');
    secEl.innerHTML=`<div class="sec-hdr"><span class="sec-ttl">${sec.icon} ${sec.lbl}</span><div class="sec-line"></div></div>`;
    arr.forEach(item=>secEl.appendChild(buildItem(item,sec)));
    if(!sec.isInc) secEl.appendChild(buildTot(sec.key));
    root.appendChild(secEl);
  });
  recalc();
}

function buildItem(item,sec){
  const fact=sumFacts(item), rem=item.plan-fact;
  const pct=item.plan>0?Math.min(100,fact/item.plan*100):0;
  const rc=rem>0?'pos':rem<0?'neg':'zero';
  const isOpen=openPanels.has(item.id);
  const barC=pct>100?'var(--red)':pct>75?'var(--orange)':'var(--accent)';
  const wrap=document.createElement('div');
  wrap.className='item-wrap';
  const readOnly=!!item.isDebt;
  wrap.innerHTML=`
    <div class="item-main" onclick="togglePanel(${item.id})">
      <span class="chev${isOpen?' open':''}">▶</span>
      <div><div class="i-name">${autoIcon(item.name)}${item.name}</div>${item.note?`<div class="i-sub">${item.note}</div>`:''}</div>
      <div class="i-plan"><div class="blbl">план</div><div class="bval">${fmt(item.plan)}</div></div>
      <div class="i-fact"><div class="blbl">факт</div><div class="bval">${fmt(fact)}</div></div>
      <div class="i-rem"><div class="blbl">залишок</div><div class="bval ${rc}">${fmt(rem)}</div></div>
    </div>
    <div class="i-prog"><div class="i-prog-fill" style="width:${pct}%;background:${barC}"></div></div>
    <div class="i-detail${isOpen?' open':''}" id="det-${item.id}">
      <div class="d-entries">
        ${item.facts?.length
          ?item.facts.map(f=>`<div class="d-entry"><span class="de-n">${f.label||'запис'}</span><span class="de-a">${fmt(f.amount)}</span>${readOnly?'':'<button class="de-del" onclick="delFact('+item.id+','+f.id+',event)">×</button>'}</div>`).join('')
          :'<div class="d-entry" style="font-size:10px;color:var(--muted)">Немає записів</div>'}
      </div>
      ${readOnly
        ?'<div style="font-size:9px;color:var(--muted2);padding-top:6px;border-top:1px solid var(--border)">Платежі вносяться у вкладці 💳 Борги</div>'
        :`<div class="add-fact-row">
            <input class="f-inp" type="text" placeholder="Назва" id="fn-${item.id}">
            <input class="f-inp amt" type="number" placeholder="${CUR.sym}" id="fa-${item.id}" onkeydown="if(event.key==='Enter')addFact(${item.id})" inputmode="decimal">
            <button class="f-add" onclick="addFact(${item.id})">+ факт</button>
          </div>`}
    </div>`;
  return wrap;
}

function buildTot(key){
  const plan=totalPlan(key),fact=totalFact(key),rem=plan-fact;
  const rc=rem>0?'pos':rem<0?'neg':'zero';
  const d=document.createElement('div');
  d.className='tot-row';
  d.innerHTML=`<span class="tot-lbl">Разом</span><div class="tot-vals"><div class="tv plan"><div class="tl">план</div><div class="tv-val">${fmt(plan)}</div></div><div class="tv fact"><div class="tl">факт</div><div class="tv-val">${fmt(fact)}</div></div><div class="tv rem"><div class="tl">залишок</div><div class="tv-val ${rc}">${fmt(rem)}</div></div></div>`;
  return d;
}

function togglePanel(id){
  openPanels.has(id)?openPanels.delete(id):openPanels.add(id);
  renderBudget();
}

function addFact(itemId){
  const lEl=document.getElementById('fn-'+itemId), aEl=document.getElementById('fa-'+itemId);
  const amount=parseFloat(aEl.value);
  if(isNaN(amount)||amount<=0){ aEl.style.borderColor='var(--red)'; setTimeout(()=>aEl.style.borderColor='',700); return; }
  for(const k of Object.keys(bdata)){
    const item=bdata[k].find(i=>i.id===itemId);
    if(item){ item.facts.push({id:uid(),label:lEl.value.trim()||'запис',amount}); break; }
  }
  openPanels.add(itemId);
  saveAll(); renderBudget();
}

function delFact(itemId,factId,e){
  e.stopPropagation();
  for(const k of Object.keys(bdata)){
    const item=bdata[k].find(i=>i.id===itemId);
    if(item){ item.facts=item.facts.filter(f=>f.id!==factId); break; }
  }
  openPanels.add(itemId);
  saveAll(); renderBudget();
}

function recalc(){
  const allKeys=Object.keys(bdata);
  let totalInc=0, totalFact=0;
  allKeys.forEach(k=>{
    const sec=SECTIONS.find(s=>s.key===k);
    if(sec?.isInc) totalInc+=totalPlan(k);
    else totalFact+=totalFact_(k);
  });
  function totalFact_(k){ return (bdata[k]||[]).reduce((s,i)=>s+sumFacts(i),0); }
  totalInc=(bdata['extraIncome']||[]).reduce((s,i)=>s+i.plan,0);
  let tExp=0;
  SECTIONS.filter(s=>!s.isInc).forEach(s=>{ tExp+=totalFact_(s.key); });
  const bal=totalInc-tExp;

  document.getElementById('s-inc').textContent=fmt(totalInc);
  document.getElementById('s-exp').textContent=fmt(tExp);
  const bEl=document.getElementById('s-bal');
  const duck=document.getElementById('bal-duck');
  bEl.textContent=fmt(bal);
  if(duck) bEl.appendChild(duck);
  bEl.style.color=bal>=0?'var(--green)':'var(--red)';
  if(duck) duck.textContent=bal>5000?'🦆😄':bal>0?'🦆😊':bal===0?'🦆😐':bal>-5000?'🦆😰':'🦆😱';
  if(_lastBal!==undefined&&_lastBal<=0&&bal>0) confetti();
  _lastBal=bal;

  // bars
  const barsWrap=document.getElementById('bars-wrap');
  const barsInner=document.getElementById('bars-inner');
  const expSecs=SECTIONS.filter(s=>!s.isInc&&s.key!=='debtsExpense');
  if(barsInner&&expSecs.length>0&&totalInc>0){
    barsWrap.style.display='';
    const colors=['c1','c2','c3','c4'];
    barsInner.innerHTML=expSecs.map((s,i)=>{
      const p=totalPlan(s.key);
      const pct=Math.min(100,p/totalInc*100);
      return `<div class="bar-item"><div class="bar-hdr"><span>${s.icon} ${s.lbl}</span><span>${fmt(p)}</span></div><div class="bar-track"><div class="bar-fill ${colors[i%4]}" style="width:0" data-w="${pct}"></div></div></div>`;
    }).join('');
    setTimeout(()=>barsInner.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.w+'%'),100);
  } else if(barsWrap){ barsWrap.style.display='none'; }

  saveAll();
}

// ═══════════════════════════════════════
//  RENDER DEBTS
// ═══════════════════════════════════════
function renderDebts(){
  const root=document.getElementById('debts-root');
  if(!root) return;
  root.innerHTML='';
  if(!debts.length){
    root.innerHTML='<div class="no-debts">Боргів немає — чудово! 🎉</div>';
    updateDebtsSummary(); updateDebtsBadge(); return;
  }
  debts.forEach(d=>{
    const card=document.createElement('div');
    card.className='debt-card type-'+d.type;
    const payments=d.payments||[];
    const totalPaid=payments.reduce((s,p)=>s+p.amount,0);
    if(d.type==='debt'){
      const rem=Math.max(0,d.amount-totalPaid);
      const payOpen=openPayRows.has(d.id);
      card.innerHTML=`
        <div class="debt-hdr">
          <div class="d-icon">💸</div>
          <div class="d-info"><div class="d-name">${d.name}</div><div class="d-meta">${d.note||'Борг'} · виплачено ${fmt(totalPaid)}</div></div>
          <div class="d-right"><div class="d-amt${rem===0?' paid':''}">${fmt(rem)}</div><div class="d-status">${rem===0?'✅ погашено':'⏳ залишок'}</div></div>
        </div>
        ${payments.length?`<div class="d-pay-log">${payments.map(p=>`<div class="dpl"><span>${p.label||'платіж'}</span><span class="dpl-a">${fmt(p.amount)}</span><button class="dpl-del" onclick="delDebtPay(${d.id},${p.id},event)">×</button></div>`).join('')}</div>`:''}
        <div class="d-pay-row${payOpen?' open':''}" id="pr-${d.id}">
          <input class="d-pay-inp nm" type="text" placeholder="Нотатка" id="dpn-${d.id}">
          <input class="d-pay-inp" type="number" placeholder="${CUR.sym}" id="dpa-${d.id}" inputmode="decimal" onkeydown="if(event.key==='Enter')addDebtPay(${d.id})">
          <button class="d-pay-btn" onclick="addDebtPay(${d.id})">Внести</button>
        </div>
        <div class="d-act-row">
          <button class="dact pay" onclick="togglePayRow(${d.id})">${payOpen?'Сховати':'💸 Внести платіж'}</button>
          <button class="dact del" onclick="deleteDebt(${d.id})">Видалити</button>
        </div>`;
    } else {
      const done=d.donePay||0, total=d.totalPay||1;
      const pct=Math.min(100,done/total*100);
      const rem=total-done;
      const dateStr=d.nextDate?new Date(d.nextDate).toLocaleDateString('uk-UA',{day:'numeric',month:'long'}):'—';
      const pips=Array.from({length:Math.min(total,40)},(_,i)=>`<div class="pip${i<done?' done':''}" onclick="togglePip(${d.id},${i})" title="Платіж ${i+1}"></div>`).join('');
      card.innerHTML=`
        <div class="debt-hdr">
          <div class="d-icon">📅</div>
          <div class="d-info"><div class="d-name">${d.name}</div><div class="d-meta">${d.note?d.note+' · ':''}наступний: ${dateStr}</div></div>
          <div class="d-right"><div class="d-amt">${fmt(d.payment)}/міс</div><div class="d-status">${done} з ${total} платежів</div></div>
        </div>
        <div class="inst-prog">
          <div class="inst-bar-hdr"><span>Прогрес</span><span>${Math.round(pct)}% · залишок ${rem} · ${fmt(rem*d.payment)}</span></div>
          <div class="inst-track"><div class="inst-fill" style="width:${pct}%"></div></div>
          <div class="inst-pips">${pips}</div>
        </div>
        <div class="d-act-row">
          <button class="dact pay" onclick="makeInstPay(${d.id})">✓ Платіж цього місяця</button>
          <button class="dact del" onclick="deleteDebt(${d.id})">Видалити</button>
        </div>`;
    }
    root.appendChild(card);
  });
  updateDebtsSummary(); updateDebtsBadge(); saveAll();
}

function togglePayRow(id){
  openPayRows.has(id)?openPayRows.delete(id):openPayRows.add(id);
  renderDebts();
  if(openPayRows.has(id)) setTimeout(()=>document.getElementById('dpa-'+id)?.focus(),100);
}

function addDebtPay(id){
  const aEl=document.getElementById('dpa-'+id), nEl=document.getElementById('dpn-'+id);
  const amount=parseFloat(aEl.value);
  if(isNaN(amount)||amount<=0){ aEl.style.borderColor='var(--red)'; setTimeout(()=>aEl.style.borderColor='',700); return; }
  const d=debts.find(x=>x.id===id); if(!d) return;
  if(!d.payments) d.payments=[];
  const pid=uid();
  d.payments.push({id:pid,label:nEl.value.trim()||'платіж',amount});
  openPayRows.delete(id);
  showToast('✓ '+fmt(amount)+' внесено у витрати бюджету');
  syncDebts(); saveAll(); renderDebts(); renderBudget();
}

function delDebtPay(debtId,payId,e){
  e.stopPropagation();
  const d=debts.find(x=>x.id===debtId); if(!d) return;
  d.payments=(d.payments||[]).filter(p=>p.id!==payId);
  syncDebts(); saveAll(); renderDebts(); renderBudget();
}

function makeInstPay(id){
  const d=debts.find(x=>x.id===id); if(!d||d.donePay>=d.totalPay) return;
  d.donePay=(d.donePay||0)+1;
  if(!d.payments) d.payments=[];
  d.payments.push({id:uid(),label:`Платіж ${d.donePay} з ${d.totalPay}`,amount:d.payment});
  if(d.nextDate){ const nd=new Date(d.nextDate); nd.setMonth(nd.getMonth()+1); d.nextDate=nd.toISOString().split('T')[0]; }
  showToast('✓ '+fmt(d.payment)+' внесено у витрати');
  syncDebts(); saveAll(); renderDebts(); renderBudget();
}

function togglePip(id,idx){
  const d=debts.find(x=>x.id===id); if(!d) return;
  d.donePay=idx<(d.donePay||0)?idx:idx+1;
  saveAll(); renderDebts();
}

function deleteDebt(id){
  debts=debts.filter(d=>d.id!==id);
  bdata['debtsExpense']=(bdata['debtsExpense']||[]).filter(i=>i.debtId!==id);
  saveAll(); renderDebts(); renderBudget();
}

function updateDebtsSummary(){
  const tot=debts.reduce((s,d)=>{
    const paid=(d.payments||[]).reduce((x,p)=>x+p.amount,0);
    return s+(d.type==='debt'?Math.max(0,d.amount-paid):d.payment*(d.totalPay-(d.donePay||0)));
  },0);
  const paid=debts.reduce((s,d)=>(d.payments||[]).reduce((x,p)=>x+p.amount,s),0);
  const maxM=debts.filter(d=>d.type==='inst').reduce((m,d)=>Math.max(m,d.totalPay-(d.donePay||0)),0);
  document.getElementById('ds-tot').textContent=fmt(tot);
  document.getElementById('ds-paid').textContent=fmt(paid);
  document.getElementById('ds-free').textContent=maxM>0?maxM+' міс':'—';
}

function updateDebtsBadge(){
  const n=debts.filter(d=>d.type==='debt'?(d.payments||[]).reduce((s,p)=>s+p.amount,0)<d.amount:(d.donePay||0)<d.totalPay).length;
  const btn=document.getElementById('debts-tab');
  const ex=btn.querySelector('.tab-badge'); if(ex) ex.remove();
  if(n>0) btn.innerHTML+=`<span class="tab-badge">${n}</span>`;
}

// ═══════════════════════════════════════
//  BUDGET MODAL
// ═══════════════════════════════════════
function openModal(type){
  bmType=type;
  document.getElementById('bm-name').value='';
  document.getElementById('bm-plan').value='';
  document.getElementById('bm-is-fact').checked=false;
  const title=document.getElementById('bm-title'), okBtn=document.getElementById('bm-ok');
  const catW=document.getElementById('bm-cat-wrap'), factW=document.getElementById('bm-fact-wrap');
  if(type==='income'){
    title.textContent='+ Дохід'; title.className='m-title inc';
    okBtn.className='mbtn ci'; okBtn.textContent='Додати дохід';
    catW.style.display='none'; factW.style.display='none';
    document.getElementById('bm-plbl').textContent='Сума';
  } else {
    title.textContent='+ Витрата'; title.className='m-title exp';
    okBtn.className='mbtn ce'; okBtn.textContent='Додати витрату';
    catW.style.display=''; factW.style.display='';
    document.getElementById('bm-plbl').textContent='Планова сума';
    // rebuild dropdown
    const sel=document.getElementById('bm-cat');
    sel.innerHTML='';
    SECTIONS.filter(s=>!s.isInc&&s.key!=='debtsExpense').forEach(s=>{
      const o=document.createElement('option'); o.value=s.key; o.textContent=s.icon+' '+s.lbl; sel.appendChild(o);
    });
  }
  document.getElementById('bm').classList.add('open');
  setTimeout(()=>document.getElementById('bm-name').focus(),100);
}
function closeBM(){ document.getElementById('bm').classList.remove('open'); }
function confirmBM(){
  const name=document.getElementById('bm-name').value.trim();
  const plan=parseFloat(document.getElementById('bm-plan').value);
  if(!name||isNaN(plan)||plan<=0){
    ['bm-name','bm-plan'].forEach(id=>{ const e=document.getElementById(id); e.style.borderColor='var(--red)'; setTimeout(()=>e.style.borderColor='',800); });
    return;
  }
  const isFact=bmType!=='income'&&document.getElementById('bm-is-fact').checked;
  const facts=isFact?[{id:uid(),label:name,amount:plan}]:[];
  const id=uid();
  if(bmType==='income'){
    if(!bdata['extraIncome']) bdata['extraIncome']=[];
    bdata['extraIncome'].push({id,name,plan,facts:[]});
  } else {
    const cat=document.getElementById('bm-cat').value;
    if(!bdata[cat]) bdata[cat]=[];
    bdata[cat].push({id,name,plan,facts});
  }
  closeBM(); saveAll(); renderBudget();
}

// ═══════════════════════════════════════
//  DEBT MODAL
// ═══════════════════════════════════════
function openDebtModal(type){
  dmType=type; setDType(type);
  ['dm-name','dm-amount','dm-pay','dm-total','dm-done','dm-note'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('dm-date').value='';
  document.getElementById('dm').classList.add('open');
  setTimeout(()=>document.getElementById('dm-name').focus(),100);
}
function closeDM(){ document.getElementById('dm').classList.remove('open'); }
function setDType(type){
  dmType=type;
  document.getElementById('tt-debt').classList.toggle('on',type==='debt');
  document.getElementById('tt-inst').classList.toggle('on',type==='inst');
  document.getElementById('dm-debt-f').style.display=type==='debt'?'':'none';
  document.getElementById('dm-inst-f').style.display=type==='inst'?'':'none';
  document.getElementById('dm-title').textContent=type==='debt'?'Додати борг':'Додати розстрочку';
}
function confirmDM(){
  const name=document.getElementById('dm-name').value.trim();
  const note=document.getElementById('dm-note').value.trim();
  if(!name){ const e=document.getElementById('dm-name'); e.style.borderColor='var(--red)'; setTimeout(()=>e.style.borderColor='',800); return; }
  if(dmType==='debt'){
    const amount=parseFloat(document.getElementById('dm-amount').value);
    if(isNaN(amount)||amount<=0){ const e=document.getElementById('dm-amount'); e.style.borderColor='var(--red)'; setTimeout(()=>e.style.borderColor='',800); return; }
    debts.push({id:uid(),type:'debt',name,note,amount,payments:[]});
  } else {
    const payment=parseFloat(document.getElementById('dm-pay').value);
    const totalPay=parseInt(document.getElementById('dm-total').value);
    if(isNaN(payment)||payment<=0||isNaN(totalPay)||totalPay<=0) return;
    const donePay=parseInt(document.getElementById('dm-done').value)||0;
    const nextDate=document.getElementById('dm-date').value;
    debts.push({id:uid(),type:'inst',name,note,payment,totalPay,donePay,nextDate,payments:[]});
  }
  closeDM(); syncDebts(); saveAll(); renderDebts(); renderBudget();
}

// ═══════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════
function saveAll(){
  try {
    store.set('b_cur', JSON.stringify(CUR));
    store.set('b_cats', JSON.stringify(CATS_ACTIVE));
    store.set('b_custom', JSON.stringify(CATS_CUSTOM));
    store.set('b_bdata', JSON.stringify(bdata));
    store.set('b_debts', JSON.stringify(debts));
    store.set('b_nextid', String(nextId));
    store.set('b_done', '1');
  } catch(e){ console.warn('save failed', e); }
}

function loadAll(){
  try {
    const cur=store.get('b_cur'); if(cur){ CUR=JSON.parse(cur); }
    const cats=store.get('b_cats'); if(cats){ CATS_ACTIVE=JSON.parse(cats); }
    const custom=store.get('b_custom'); if(custom){ CATS_CUSTOM=JSON.parse(custom); }
    const bd=store.get('b_bdata'); if(bd){ bdata=JSON.parse(bd); }
    const db=store.get('b_debts'); if(db){ debts=JSON.parse(db); }
    const nid=store.get('b_nextid'); if(nid){ nextId=parseInt(nid)||1; }
    return !!store.get('b_done');
  } catch(e){ console.warn('load failed', e); return false; }
}
